name: Monthly CTL Report

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to report (YYYY-MM). Leave blank for previous month.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r orm-reports/requirements.txt

      - name: Fetch Press Ganey data
        env:
          PG_APP_ID: ${{ secrets.PG_APP_ID }}
          PG_APP_SECRET: ${{ secrets.PG_APP_SECRET }}
          PG_NODE_ID: ${{ secrets.PG_NODE_ID }}
        run: |
          MONTH="${{ github.event.inputs.month }}"
          if [ -z "$MONTH" ]; then
            python orm-reports/scripts/fetch_data.py \
              --output orm-reports/scripts/data.json
          else
            python orm-reports/scripts/fetch_data.py \
              --month "$MONTH" \
              --output orm-reports/scripts/data.json
          fi

      - name: Build PowerPoint report
        run: |
          MONTH="${{ github.event.inputs.month }}"
          if [ -z "$MONTH" ]; then
            MONTH=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m 2>/dev/null || date -v-1m +%Y-%m)
          fi
          mkdir -p docs/reports
          python orm-reports/scripts/build_report.py \
            --data orm-reports/scripts/data.json \
            --output docs/reports/WMCHealth_CTL_${MONTH}.pptx

      - name: Update dashboard
        run: |
          python orm-reports/scripts/update_dashboard.py \
            --data orm-reports/scripts/data.json \
            --docs docs

      - name: Save data and report to repo
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add orm-reports/scripts/data.json
          git add docs/
          git diff --staged --quiet || git commit -m "📊 Auto-generate CTL report $(date +'%B %Y')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
